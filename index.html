<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Or Nothing ULTRA</title><style>
body{margin:0;font-family:sans-serif;background:#0b0f14;color:white;display:flex}
.sidebar{width:220px;background:#0f141b;height:100vh;padding:15px}
.sidebar button{width:100%;margin-bottom:10px}
.main{flex:1;padding:15px}
.card{background:#121821;border-radius:12px;padding:15px;margin-bottom:15px}
.green{color:#00ff9f}
.red{color:#ff4d4d}
button{padding:10px;border:none;border-radius:8px;background:#00ffcc}
input{width:100%;padding:8px;margin-top:5px;background:#0f141b;color:white;border:none}
</style></head>
<body><div class="sidebar">
<h3>Menu</h3>
<button onclick="show('market')">Market</button>
<button onclick="show('biz')">Business</button>
<button onclick="show('loan')">Loan</button>
<button onclick="show('account')">Account</button>
</div><div class="main"><div id="market" class="card">
<h3>📈 Market</h3>
<div id="money">$0</div>
<input id="startInput" placeholder="Start amount">
<button onclick="startGame()">Start</button>
<button onclick="cashOut()">Cash Out</button>
</div><div id="biz" class="card" style="display:none">
<h3>🏢 Business</h3>
<button onclick="buyBusiness()">Buy</button>
<div id="bizList"></div>
</div><div id="loan" class="card" style="display:none">
<h3>💸 Loan</h3>
<button onclick="takeLoan()">Loan 100$</button>
<input id="loanUser" placeholder="User ID">
<input id="loanAmount" placeholder="Amount">
<input id="loanInterest" placeholder="Interest %">
<button onclick="lendUser()">Lend to User</button>
</div><div id="account" class="card" style="display:none">
<h3>🔐 Account</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<div id="user"></div>
</div></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyApg3_-4YcixNHlUQ8lKDs2RFzNpvNGbUE",
authDomain:"economy-b8b38.firebaseapp.com",
projectId:"economy-b8b38"
});

const auth=getAuth();
const db=getFirestore();
let user=null;

window.register=async()=>{
let r=await createUserWithEmailAndPassword(auth,email.value,pass.value);
user=r.user;userUI();saveCloud();
}

window.login=async()=>{
let r=await signInWithEmailAndPassword(auth,email.value,pass.value);
user=r.user;userUI();loadCloud();
}

function userUI(){document.getElementById('user').innerText=user.uid}

let total=100,current=0,running=false;
let businesses=[],loans=0;

function update(){
let m=document.getElementById('money');
m.innerText='$'+current.toFixed(2);
m.className=current>=0?'green':'red';
renderBiz();
}

function getMult(){
let r=Math.random();
if(r<0.45) return 1.03;
if(r<0.9) return 0.5+Math.random()*0.3;
return Math.random()<0.5?1.6:0.3;
}

setInterval(()=>{
if(!running)return;
current*=getMult();
if(current<0) businesses=[];
update();
},900);

window.startGame=()=>{
let v=parseFloat(startInput.value);
if(!v||v>total)return;
total-=v;current=v;running=true;
}

window.cashOut=()=>{
running=false;
total+=current;current=0;update();saveCloud();
}

window.buyBusiness=()=>{
if(total<300)return;
total-=300;
businesses.push({income:1,delay:60,progress:0});
}

function renderBiz(){
let el=document.getElementById('bizList');el.innerHTML='';
businesses.forEach((b,i)=>{
el.innerHTML+=`<div>Biz ${i+1} $${b.income}</div>`;
})
}

setInterval(()=>{
businesses.forEach(b=>{
b.progress++;
if(b.progress>=b.delay){total+=b.income;b.progress=0}
})
update();
},1000);

// loan system
window.takeLoan=()=>{
total+=100;loans++;
setTimeout(()=>{total-=100*(1+loans*0.05)},60000);
}

// lend to user
window.lendUser=async()=>{
if(!user)return;
let uid=loanUser.value;
let amt=parseFloat(loanAmount.value);
let int=parseFloat(loanInterest.value);
await setDoc(doc(db,'loans',uid),{amount:amt,interest:int});
}

async function saveCloud(){
if(!user)return;
await setDoc(doc(db,'players',user.uid),{money:total});
}

async function loadCloud(){
let d=await getDoc(doc(db,'players',user.uid));
if(d.exists()) total=d.data().money;
}

window.show=(id)=>{
['market','biz','loan','account'].forEach(x=>document.getElementById(x).style.display='none');
document.getElementById(id).style.display='block';
}

update();
</script></body>
</html>
